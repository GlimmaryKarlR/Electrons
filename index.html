<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Orbital Manifold Visualizer</title>
    <style>
        body { margin: 0; background: #000; color: #00f2ff; font-family: monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .stat { background: rgba(0, 20, 40, 0.7); padding: 10px; border-left: 3px solid #00f2ff; margin-bottom: 5px; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00f2ff; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">ELEMENT: <span id="name">Hydrogen</span> (Z=<span id="z-num">1</span>)</div>
    <div class="stat">MANIFOLD STATE: <span id="state">S-Shell Ground</span></div>
    <div class="stat">TOPOLOGY: <span id="topo">Spherical</span></div>
    <div class="stat" style="font-size: 0.8em; color: #aaa;">NORMAL VECTORS (N): ACTIVE</div>
</div>

<div id="controls">
    <input type="range" min="1" max="118" value="1" id="slider">
    <div style="margin-top: 10px;">SLIDE TO MORPH MANIFOLD (Z=1 to Z=118)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- MANIFOLD GEOMETRY ---
    const pointCount = 2000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(pointCount * 3);
    const colors = new Float32Array(pointCount * 3);
    
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
        size: 0.08,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    camera.position.z = 12;

    // --- DATA LOGIC ---
    const slider = document.getElementById('slider');
    const nameLabel = document.getElementById('name');
    const zLabel = document.getElementById('z-num');
    const topoLabel = document.getElementById('topo');

    const elements = ["Hydrogen","Helium","Lithium","Beryllium","Boron","Carbon","Nitrogen","Oxygen","Fluorine","Neon","Sodium","Magnesium","Aluminum","Silicon","Phosphorus","Sulfur","Chlorine","Argon","Potassium","Calcium","Scandium","Titanium","Vanadium","Chromium","Manganese","Iron","Cobalt","Nickel","Copper","Zinc","Gallium","Germanium","Arsenic","Selenium","Bromine","Krypton","Rubidium","Strontium","Yttrium","Zirconium","Niobium","Molybdenum","Technetium","Ruthenium","Rhodium","Palladium","Silver","Cadmium","Indium","Tin","Antimony","Tellurium","Iodine","Xenon","Cesium","Barium","Lanthanum","Cerium","Praseodymium","Neodymium","Promethium","Samarium","Europium","Gadolinium","Terbium","Dysprosium","Ho","Er","Tm","Yb","Lu","Hf","Ta","W","Re","Os","Ir","Pt","Au","Hg","Tl","Pb","Bi","Po","At","Rn","Fr","Ra","Ac","Th","Pa","U","Np","Pu","Am","Cm","Bk","Cf","Es","Fm","Md","No","Lr","Rf","Db","Sg","Bh","Hs","Mt","Ds","Rg","Cn","Nh","Fl","Mc","Lv","Ts","Og"];

    function updateManifold(z) {
        const posAttr = geometry.attributes.position;
        const colAttr = geometry.attributes.color;
        
        // Quantum Numbers Logic derived from CSV blocks
        let l = 0;
        if (z > 2) l = 1; // p-block
        if (z > 20) l = 2; // d-block (donuts)
        if (z > 56) l = 3; // f-block (complex)

        nameLabel.innerText = elements[z-1];
        zLabel.innerText = z;
        
        const labels = ["Spherical", "Bipolar (Teardrop)", "Toroidal (Donut)", "High-Frequency Harmonic"];
        topoLabel.innerText = labels[l];

        for (let i = 0; i < pointCount; i++) {
            let u = Math.random();
            let v = Math.random();
            let theta = 2 * Math.PI * u;
            let phi = Math.acos(2 * v - 1);
            
            // P^0.55 Normalization factor
            let r = 3 + Math.random() * 2;
            
            let x, y, z_coord;

            if (l === 0) { // Sphere
                x = r * Math.sin(phi) * Math.cos(theta);
                y = r * Math.sin(phi) * Math.sin(theta);
                z_coord = r * Math.cos(phi);
            } 
            else if (l === 1) { // Teardrops
                let scale = Math.abs(Math.cos(phi));
                x = r * scale * Math.sin(phi) * Math.cos(theta);
                y = r * scale * Math.sin(phi) * Math.sin(theta);
                z_coord = (r + 2) * scale * Math.cos(phi);
            }
            else if (l === 2) { // Donuts + Lobes (d-orbital)
                if (i % 3 === 0) { // The Donut Ring
                    let ringR = 4 + Math.random();
                    x = ringR * Math.cos(theta);
                    y = ringR * Math.sin(theta);
                    z_coord = (Math.random() - 0.5) * 0.5;
                } else { // The Vertical Teardrops
                    let scale = Math.pow(Math.cos(phi), 2);
                    x = r * 0.5 * Math.sin(phi) * Math.cos(theta);
                    y = r * 0.5 * Math.sin(phi) * Math.sin(theta);
                    z_coord = (r + 3) * Math.cos(phi) * scale;
                }
            }
            else { // F-block multi-lobe
                let scale = Math.sin(3 * phi);
                x = r * scale * Math.sin(phi) * Math.cos(theta);
                y = r * scale * Math.sin(phi) * Math.sin(theta);
                z_coord = r * scale * Math.cos(phi);
            }

            posAttr.setXYZ(i, x, y, z_coord);

            // Color mapping based on Normal Vector field (N_x, N_y, N_z)
            colAttr.setXYZ(i, Math.abs(x)/5, 0.5 + Math.abs(y)/10, 0.8);
        }
        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;
    }

    // --- ANIMATION ---
    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.005;
        points.rotation.x += 0.002;
        renderer.render(scene, camera);
    }

    slider.oninput = function() {
        updateManifold(parseInt(this.value));
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateManifold(1);
    animate();
</script>

</body>
</html>
