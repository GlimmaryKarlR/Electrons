<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Orbital Manifold | High-Fidelity Wavefunctions</title>
    <style>
        :root {
            --bg: #050508;
            --panel: #0d0d12;
            --accent: #00d2ff;
            --text: #ffffff;
            --secondary: #005f73;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 90%;
            max-width: 1100px;
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .viz-container {
            background: var(--panel);
            border-radius: 20px;
            height: 500px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0, 210, 255, 0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #orbital-canvas {
            width: 100%;
            height: 100%;
        }

        .controls {
            background: var(--panel);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            opacity: 0.8;
        }

        .stat-value {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
        }

        .slider-wrap {
            margin-top: 30px;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .formula-card {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            color: #00ff41;
            margin-top: 15px;
        }

        .nodal-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 210, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="viz-container">
        <div class="nodal-indicator" id="nodal-type">Angular Node: l=0 (Spherical)</div>
        <canvas id="orbital-canvas"></canvas>
    </div>

    <div class="controls">
        <h1>Unitary Morphogenesis</h1>
        
        <div class="stat-box">
            <div class="stat-label">Element / Atomic Number</div>
            <div class="stat-value" id="disp-element">Hydrogen (Z=1)</div>
        </div>

        <div class="stat-box">
            <div class="stat-label">Quantum State (n, l, m)</div>
            <div class="stat-value" id="disp-quantum">n=1, l=0, m=0</div>
        </div>

        <div class="stat-box">
            <div class="stat-label">Normalization (Power-Law)</div>
            <div class="stat-value">P<sup>0.55</sup></div>
        </div>

        <div class="formula-card" id="disp-formula">
            ψ(r,θ,φ) = R(r)Y(θ,φ)
        </div>

        <div class="slider-wrap">
            <label style="font-size: 0.8rem;">Adjust Atomic Manifold (Z=1 to 118):</label>
            <input type="range" min="1" max="118" value="1" id="z-slider">
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('orbital-canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('z-slider');
    
    // --- DATA FROM PYTHON SCRIPT ---
    const AUFBAU_ORDER = [
        {n:1, l:0, max:2}, {n:2, l:0, max:2}, {n:2, l:1, max:6}, {n:3, l:0, max:2}, 
        {n:3, l:1, max:6}, {n:4, l:0, max:2}, {n:3, l:2, max:10}, {n:4, l:1, max:6},
        {n:5, l:0, max:2}, {n:4, l:2, max:10}, {n:5, l:1, max:6}, {n:6, l:0, max:2}, 
        {n:4, l:3, max:14}, {n:5, l:2, max:10}, {n:6, l:1, max:6}, {n:7, l:0, max:2},
        {n:5, l:3, max:14}, {n:6, l:2, max:10}, {n:7, l:1, max:6}
    ];

    const elementNames = ["Hydrogen","Helium","Lithium","Beryllium","Boron","Carbon","Nitrogen","Oxygen","Fluorine","Neon","Sodium","Magnesium","Aluminum","Silicon","Phosphorus","Sulfur","Chlorine","Argon","Potassium","Calcium","Scandium","Titanium","Vanadium","Chromium","Manganese","Iron","Cobalt","Nickel","Copper","Zinc","Gallium","Germanium","Arsenic","Selenium","Bromine","Krypton","Rubidium","Strontium","Yttrium","Zirconium","Niobium","Molybdenum","Technetium","Ruthenium","Rhodium","Palladium","Silver","Cadmium","Indium","Tin","Antimony","Tellurium","Iodine","Xenon","Cesium","Barium","Lanthanum","Cerium","Praseodymium","Neodymium","Promethium","Samarium","Europium","Gadolinium","Terbium","Dysprosium","Holmium","Errbium","Thulium","Ytterbium","Lutetium","Hafnium","Tantalum","Tungsten","Rhenium","Osmium","Iridium","Platinum","Gold","Mercury","Thallium","Lead","Bismuth","Polonium","Astatine","Radon","Francium","Radium","Actinium","Thorium","Protactinium","Uranium","Neptunium","Plutonium","Americium","Curium","Berkelium","Californium","Einsteinium","Fermium","Mendelevium","Nobelium","Lawrencium","Rutherfordium","Dubnium","Seaborgium","Bohrium","Hassium","Meitnerium","Darmstadtium","Roentgenium","Copernicium","Nihonium","Flerovium","Moscovium","Livermorium","Tennessine","Oganesson"];

    function getQuantumNumbers(z) {
        let remaining = z;
        let lastN = 1, lastL = 0;
        for (let shell of AUFBAU_ORDER) {
            if (remaining <= shell.max) {
                lastN = shell.n;
                lastL = shell.l;
                break;
            }
            remaining -= shell.max;
        }
        // Simplified m selection logic for visualization
        let m = (lastL > 0) ? Math.floor(Math.random() * (2 * lastL + 1)) - lastL : 0;
        return { n: lastN, l: lastL, m: 0 }; // m=0 often gives the 'donut' in d-orbitals
    }

    function drawOrbital(n, l, m) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const time = Date.now() * 0.002;

        // P^0.55 Normalization effect
        const baseAlpha = 0.55;
        
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00d2ff';

        if (l === 0) { // s-orbital (Sphere)
            const radius = 40 + (n * 15);
            let gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            gradient.addColorStop(0, `rgba(0, 210, 255, 1)`);
            gradient.addColorStop(1, `rgba(0, 210, 255, 0)`);
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(cx, cy, radius * (1 + Math.sin(time)*0.05), 0, Math.PI * 2);
            ctx.fill();
        } 
        else if (l === 1) { // p-orbital (Teardrops/Dumbbell)
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.2);
            for (let i = 0; i < 2; i++) {
                ctx.rotate(Math.PI);
                let grad = ctx.createRadialGradient(0, 50, 0, 0, 50, 60);
                grad.addColorStop(0, '#00d2ff');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(0, 60, 40, 70, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        else if (l === 2) { // d-orbital (Clovers and Donuts)
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.3);
            // Draw central donut (toroid)
            ctx.beginPath();
            ctx.ellipse(0, 0, 70, 25, 0, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.8)';
            ctx.lineWidth = 15;
            ctx.stroke();
            // Draw teardrop lobes
            for (let i = 0; i < 2; i++) {
                ctx.rotate(Math.PI);
                let grad = ctx.createRadialGradient(0, 80, 0, 0, 80, 50);
                grad.addColorStop(0, '#00d2ff');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(0, 90, 30, 60, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        else { // f-orbital (Complex)
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.5);
            for (let i = 0; i < 6; i++) {
                ctx.rotate(Math.PI / 3);
                ctx.fillStyle = 'rgba(0, 210, 255, 0.6)';
                ctx.beginPath();
                ctx.ellipse(0, 70, 20, 50, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
    }

    function update() {
        const z = parseInt(slider.value);
        const {n, l, m} = getQuantumNumbers(z);
        
        document.getElementById('disp-element').innerText = `${elementNames[z-1]} (Z=${z})`;
        document.getElementById('disp-quantum').innerText = `n=${n}, l=${l}, m=${m}`;
        
        const labels = ["s-Shell (Spherical)", "p-Block (Teardrops)", "d-Block (Donuts/Clovers)", "f-Block (Complex Manifold)"];
        document.getElementById('nodal-type').innerText = `Angular Node: l=${l} ${labels[l] || ""}`;

        // Dynamic formula update
        const formulas = [
            "ψ = (1/√π)e⁻ʳ", 
            "ψ = (1/2√6)re⁻ʳ/²cosθ", 
            "ψ = (1/81√6π)r²e⁻ʳ/³(3cos²θ-1)",
            "ψ = complex_harmonic(l=3)"
        ];
        document.getElementById('disp-formula').innerText = formulas[l] || formulas[0];

        drawOrbital(n, l, m);
        requestAnimationFrame(update);
    }

    // Initialize
    canvas.width = 600;
    canvas.height = 500;
    update();

</script>
</body>
</html>
